<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>클래스 투표 시스템</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="setup-screen" class="screen active">
        <header>
          <h1>학급 회장 선거</h1>
          <p>투표 항목을 입력하고 바로 선거를 시작하세요.</p>
        </header>

        <div class="card">
          <label>
            <span>선거 제목</span>
            <input id="election-title" type="text" value="학급 회장 선거" />
          </label>

          <label>
            <span>투표 항목 (한 줄에 하나씩)</span>
            <textarea id="candidate-input" rows="8" placeholder="예:&#10;1번 김민준&#10;2번 이서연&#10;3번 박지호">1번 김민준
2번 이서연
3번 박지호
4번 최하윤</textarea>
          </label>

          <div class="button-row">
            <button id="start-vote" class="btn btn-primary">투표 시작</button>
          </div>
        </div>
      </section>

      <section id="vote-screen" class="screen">
        <header>
          <h2 id="vote-title">학급 회장 선거</h2>
          <p id="vote-subtitle">원하는 후보를 터치/클릭해 주세요.</p>
        </header>

        <div id="candidate-grid" class="candidate-grid"></div>

        <footer class="vote-footer">
          <div class="counter">총 투표 수: <strong id="vote-count">0</strong></div>
          <div class="button-row">
            <button id="reset-current" class="btn">선택 초기화</button>
            <button id="finish-vote" class="btn btn-danger">투표 종료 및 결과 발표</button>
          </div>
        </footer>
      </section>

      <section id="result-screen" class="screen">
        <header>
          <h2 id="result-title">결과 발표</h2>
          <p id="result-subtitle">두근두근! 결과를 공개합니다.</p>
        </header>

        <div id="dramatic-stage" class="dramatic-stage hidden">
          <div class="lights"></div>
          <div class="countdown" id="countdown">3</div>
        </div>

        <div id="ranking-list" class="ranking-list"></div>

        <footer class="button-row">
          <button id="new-election" class="btn">새 선거 준비</button>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
